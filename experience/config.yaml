# ============================================================
# 実験共通パラメータ設定
# experience/common.py および各実験スクリプトで読み込む
# ============================================================

# ---- 状態空間 ----
state_dim: 64          # d: デフォルト状態次元 (Exp3 では [32, 64, 128])
obs_dim: 8             # q: 観測次元

# ---- 時間発展 ----
T: 20                  # タイムステップ数
gamma: 0.1             # tanh 項の係数 γ
dynamics_seed: 0       # Dynamics 初期化シード（Exp2 では 0〜9 を使用）

# ---- 介入スケジュール ----
E1_timestep: 5         # E1（加算型）を適用するタイムステップ
E2_timestep: 15        # E2（線形変換型）を適用するタイムステップ

# ---- 介入パラメータ ----
# a: 加算ベクトル（次元 0:d//4 のみ 1.0）
# M_base: ランダム行列（seed=0, スケール 0.1）
M_base_seed: 0         # M_base 生成シード
M_base_scale: 0.1      # M_base のスケール

# ---- Ground truth ----
theta_star: [1.0, 1.0] # θ* = (θ₁*, θ₂*)

# ---- バッチ・初期状態 ----
batch: 32              # バッチサイズ（全実験共通）
p0_seed: 42            # p0_fixed 生成シード

# ---- 平滑化カーネル（デフォルト: 長さ 5 の二項係数）----
kernel_weights: [1.0, 4.0, 6.0, 4.0, 1.0]   # 正規化前の重み

# ---- 最適化（Exp 1〜3, 5）----
lr: 0.01               # Adam 学習率
n_steps: 500           # 最適化ステップ数
n_init: 20             # 初期値サンプル数（Exp1）
theta_init_range: 2.0  # 初期値の一様分布範囲 Uniform(-r, r)

# ---- Exp 2 ----
n_dynamics: 10         # ランダムダイナミクスの試行数

# ---- Exp 3 ----
state_dims: [32, 64, 128]   # 検証する状態次元

# ---- Exp 4 ----
grid_n: 50             # グリッドサーチの各軸点数
grid_range: 3.0        # グリッドの範囲 [-r, r]

# ---- Exp 5 ----
eps_list: [1.0, 0.5, 0.2, 0.1, 0.05]   # スケーリング検証用 ε リスト
